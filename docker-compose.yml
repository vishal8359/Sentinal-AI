services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      NVIDIA_NIM_API_KEY: ${NVIDIA_NIM_API_KEY:-demo}
      SENTINELAI_DB_PATH: /app/data/sentinelai.db
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
